<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take the Pledge - Hermetic Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .certificate-img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>

<header style="padding: 2rem 2rem;">
    <a href="index.html" class="back-link" style="top: 2.3rem;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Hub
    </a>
    <h1 style="font-size: 1.5rem; margin-bottom: 0;">Take the Pledge</h1>
</header>

<main style="max-width: 1000px; padding: 2rem;">
    <div class="viewer-container">
        <div class="viewer-header">
            <span style="color: #a3a3a3; font-size: 0.9rem;">Developers Without Borders</span>
            <a href="#" onclick="forceDownload(event, 'Developers without Borders/Developers Without Borders pledge certificate.png', 'Developers_Without_Borders_Pledge.png')" class="btn-download">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download Certificate
            </a>
        </div>
        <img src="Developers without Borders/Developers Without Borders pledge certificate.png" alt="Pledge Certificate" class="certificate-img">
    </div>
</main>

<footer>
    &copy; 2026 Hermetic Labs. All rights reserved.
</footer>

<script>
function forceDownload(e, url, filename) {
    e.preventDefault();
    
    // Change button text to show progress
    const btn = e.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Downloading...';
    
    const encodedUrl = encodeURI(url);
    
    fetch(encodedUrl)
        .then(response => {
            if (!response.ok) throw new Error('File not found');
            return response.blob();
        })
        .then(blob => {
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(blobUrl);
            btn.innerHTML = originalText;
        })
        .catch(err => {
            console.error('Download failed:', err);
            btn.innerHTML = originalText;
        });
}
</script>
</body>
</html>
